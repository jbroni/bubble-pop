<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="blobBody" cx="33%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#ffd6ea"/>
      <stop offset="42%" stop-color="#ff5fa8"/>
      <stop offset="100%" stop-color="#cf1470"/>
    </radialGradient>
    <filter id="glossBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- 3 curls (Pink's colorblind-accessible accessory) -->
  <circle cx="34" cy="12" r="7.2" fill="#cf1470"/>
  <circle cx="50" cy="8" r="7.2" fill="#cf1470"/>
  <circle cx="66" cy="12" r="7.2" fill="#cf1470"/>

  <!-- body -->
  <circle cx="50" cy="52" r="40" fill="url(#blobBody)"/>

  <!-- gloss highlight -->
  <ellipse cx="34.8" cy="28" rx="13.6" ry="8" fill="#ffffff" fill-opacity="0.75"
           transform="rotate(-24 34.8 28)" filter="url(#glossBlur)"/>

  <!-- eyes -->
  <ellipse cx="37.7" cy="49.6" rx="9.2" ry="10.4" fill="#ffffff"/>
  <ellipse cx="62.3" cy="49.6" rx="9.2" ry="10.4" fill="#ffffff"/>
  <ellipse cx="37.9" cy="51.48" rx="4.24" ry="4.79" fill="#2b2340"/>
  <ellipse cx="62.47" cy="51.48" rx="4.24" ry="4.79" fill="#2b2340"/>

  <!-- smile mouth -->
  <path d="M38.8,64.8 A11.2,6.4 0 0 0 61.2,64.8" fill="none" stroke="#2b2340"
        stroke-width="4" stroke-linecap="round"/>
</svg>
